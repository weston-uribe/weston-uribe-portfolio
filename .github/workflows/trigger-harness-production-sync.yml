<!-- p-dev-target-workflow-contract:v2
contract_version: 2
harness_dispatch_repo: weston-uribe/p-dev-harness-runner
repo_config_id: weston-uribe-portfolio
production_branch: main
-->
name: Trigger harness production sync

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch production_promoted to harness
        env:
          HARNESS_DISPATCH_TOKEN: ${{ secrets.HARNESS_DISPATCH_TOKEN }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${HARNESS_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/weston-uribe/p-dev-harness-runner/dispatches \
            -d "$(jq -n \
              --arg repo weston-uribe-portfolio \
              --arg branch main \
              --arg source weston-uribe/weston-uribe-portfolio \
              --arg after "${{ github.sha }}" \
              --arg ref "${{ github.ref }}" \
              --arg run_id "${{ github.run_id }}" \
              --arg received "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{event_type:"production_promoted", client_payload:{repo:$repo, productionBranch:$branch, sourceRepo:$source, after:$after, ref:$ref, githubRunId:$run_id, receivedAt:$received}}')"
